<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔐 Admin Panel - Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.particle{position:absolute;border-radius:50%;background:rgba(99,102,241,0.3);animation:float 6s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) scale(1);opacity:0.3}50%{transform:translateY(-30px) scale(1.2);opacity:0.6}}
.login-box{position:relative;z-index:1;background:rgba(17,17,27,0.95);border:1px solid rgba(99,102,241,0.2);border-radius:20px;padding:50px 40px;width:420px;backdrop-filter:blur(20px);box-shadow:0 25px 60px rgba(0,0,0,0.5),0 0 40px rgba(99,102,241,0.1)}
.login-box::before{content:'';position:absolute;top:-1px;left:-1px;right:-1px;bottom:-1px;border-radius:20px;background:linear-gradient(135deg,rgba(99,102,241,0.3),transparent,rgba(168,85,247,0.3));z-index:-1;padding:1px}
.logo{text-align:center;margin-bottom:35px}
.logo .icon{font-size:48px;margin-bottom:10px;display:block}
.logo h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo p{color:#6b7280;font-size:13px;margin-top:5px}
.field{margin-bottom:25px}
.field label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#9ca3af;margin-bottom:8px}
.field input{width:100%;padding:14px 18px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;font-size:15px;transition:all 0.3s;outline:none}
.field input:focus{border-color:#6366f1;box-shadow:0 0 20px rgba(99,102,241,0.2)}
.btn{width:100%;padding:15px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s;letter-spacing:0.5px}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(99,102,241,0.4)}
.btn:active{transform:translateY(0)}
.error{color:#ef4444;text-align:center;margin-top:15px;font-size:13px;display:none}
</style>
</head>
<body>
<div class="particles">
<div class="particle" style="width:6px;height:6px;top:20%;left:10%;animation-delay:0s"></div>
<div class="particle" style="width:4px;height:4px;top:40%;left:80%;animation-delay:1s"></div>
<div class="particle" style="width:8px;height:8px;top:70%;left:30%;animation-delay:2s"></div>
<div class="particle" style="width:5px;height:5px;top:15%;left:60%;animation-delay:3s"></div>
<div class="particle" style="width:7px;height:7px;top:85%;left:70%;animation-delay:4s"></div>
</div>
<div class="login-box">
<div class="logo">
<span class="icon">⚡</span>
<h1>COIN BOT ADMIN</h1>
<p>Secure Control Panel</p>
</div>
<div class="field">
<label>Password</label>
<input type="password" id="pwd" placeholder="Enter admin password" autofocus>
</div>
<button class="btn" onclick="doLogin()">🔓 Access Panel</button>
<p class="error" id="err"></p>
</div>
<script>
document.getElementById('pwd').addEventListener('keypress',e=>{if(e.key==='Enter')doLogin()});
async function doLogin(){
const p=document.getElementById('pwd').value;
const r=await fetch('/panel/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:p})});
if(r.ok){window.location='/panel'}else{const e=document.getElementById('err');e.textContent='❌ Invalid password';e.style.display='block'}
}
</script>
</body>
</html>
